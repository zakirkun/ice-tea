rules:
    - id: AUTH-CONC-001
      name: session-create-no-old-invalidation
      description: "New session created on login without invalidating existing sessions"
      severity: medium
      confidence: low
      cwe: [CWE-613]
      owasp: ['A07:2025']
      languages: [javascript, typescript, python, php, kotlin, dart, zig, elixir]
      patterns:
        - regex: "(?:jwt\\.sign|createSession|generateToken)\\s*\\([^)]+\\)"
    - id: AUTH-CONC-002
      name: no-session-count-limit
      description: "User session created without checking session count limit"
      severity: low
      confidence: low
      cwe: [CWE-613]
      owasp: ['A07:2025']
      languages: [javascript, typescript, python, php, kotlin, dart, zig, elixir]
      patterns:
        - regex: "Session\\.create\\s*\\([^)]+\\)"
    - id: AUTH-CONC-003
      name: logout-single-session-only
      description: "Logout only destroys current session, not all user sessions"
      severity: medium
      confidence: low
      cwe: [CWE-613]
      owasp: ['A07:2025']
      languages: [javascript, typescript, python, php, kotlin, dart, zig, elixir]
      patterns:
        - regex: "req\\.session\\.destroy\\s*\\(\\s*\\)"
        - regex: "session\\.flush\\s*\\(\\s*\\)"
