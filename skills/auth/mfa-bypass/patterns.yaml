rules:
    - id: AUTH-MFA-001
      name: otp-insecure-random
      description: "OTP/TOTP generated using non-cryptographic random number generator"
      severity: critical
      confidence: high
      cwe: [CWE-338]
      owasp: ['A07:2025']
      languages: [javascript, typescript]
      patterns:
        - regex: "(?i)Math\\.random\\(\\).*(?:otp|token|code|pin|totp)"
        - regex: "(?i)(?:otp|token|code|pin).*Math\\.random\\(\\)"
        - regex: "Math\\.floor\\(Math\\.random\\(\\)\\s*\\*\\s*(?:100000|1000000|10000)\\)"
    - id: AUTH-MFA-002
      name: php-otp-rand
      description: "PHP OTP generated with rand() or mt_rand() instead of random_int()"
      severity: critical
      confidence: high
      cwe: [CWE-338]
      owasp: ['A07:2025']
      languages: [php]
      patterns:
        - regex: "(?i)\\$(?:otp|code|token|pin)\\s*=\\s*(?:rand|mt_rand)\\s*\\("
        - regex: "(?i)rand\\s*\\(\\s*100000\\s*,\\s*999999\\s*\\)"
    - id: AUTH-MFA-003
      name: python-otp-random
      description: "Python OTP generated with random.randint() instead of secrets module"
      severity: critical
      confidence: high
      cwe: [CWE-338]
      owasp: ['A07:2025']
      languages: [python]
      patterns:
        - regex: "(?i)random\\.randint.*(?:otp|token|code|pin)"
        - regex: "(?i)(?:otp|code|pin).*=.*random\\.randint"
    - id: AUTH-MFA-004
      name: mfa-client-side-check
      description: "MFA verification logic in client-side JavaScript (bypassable)"
      severity: critical
      confidence: medium
      cwe: [CWE-602]
      owasp: ['A07:2025']
      languages: [javascript, typescript]
      patterns:
        - regex: "(?i)(?:mfa|2fa|totp).*verified.*(?:true|false)"
        - regex: "(?i)if\\s*\\(\\s*(?:mfa|twoFactor|2fa)(?:Verified|Passed|Valid)\\s*\\)"
    - id: AUTH-MFA-005
      name: mfa-session-flag-manipulation
      description: "MFA state stored in easily-manipulable session/cookie boolean flag"
      severity: high
      confidence: medium
      cwe: [CWE-287]
      owasp: ['A07:2025']
      languages: [javascript, typescript, python, php]
      patterns:
        - regex: "(?i)(?:req\\.session|session|\\$_SESSION)\\s*\\.?\\[?\\s*['\"]?(?:mfa_verified|2fa_passed|mfa_done|totp_ok)['\"]?\\s*\\]?\\s*=\\s*true"
    - id: AUTH-MFA-006
      name: hardcoded-backup-codes
      description: "MFA backup codes hardcoded in source code"
      severity: critical
      confidence: high
      cwe: [CWE-798]
      owasp: ['A07:2025']
      languages: [javascript, typescript, python, go, java, php]
      patterns:
        - regex: "(?i)backup_codes?\\s*[=:]\\s*\\[[^\\]]+\\]"
        - regex: "(?i)recovery_codes?\\s*=\\s*\\[['\"]\\w{8,}['\"]"
    - id: AUTH-MFA-007
      name: otp-no-expiry
      description: "OTP stored without expiration time — allows replay attacks"
      severity: high
      confidence: low
      cwe: [CWE-287]
      owasp: ['A07:2025']
      languages: [javascript, typescript, python, go, java, php]
      patterns:
        - regex: "(?i)(?:store|save|set).*(?:otp|code|token)"
