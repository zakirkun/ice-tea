rules:
  - id: BL-RACE-001
    name: balance-check-then-update-separate
    description: "Balance checked then updated in separate queries — TOCTOU race condition"
    severity: high
    confidence: low
    cwe: [CWE-362]
    owasp: [A01:2025]
    languages: [javascript, typescript, python, php, java, go]
    patterns:
      - regex: "(?:balance|credits|stock)\\s*>=\\s*amount[^;]*;[^;]*(?:balance|credits|stock)\\s*-=\\s*amount"
      - regex: "if\\s*\\([^)]*balance\\s*>=\\s*[^)]*\\)[^{]*\\{(?:[^}]*;){1,5}[^}]*balance\\s*-=\\s*"

  - id: BL-RACE-002
    name: no-for-update-in-payment
    description: "Payment query reads balance without SELECT FOR UPDATE locking"
    severity: high
    confidence: low
    cwe: [CWE-362]
    owasp: [A01:2025]
    languages: [javascript, typescript, python, php, java, go]
    patterns:
      - regex: "SELECT.*balance.*FROM.*(?:accounts|wallets|users)(?![^;]*FOR UPDATE|[^;]*LOCK)"
      - regex: "\\.findOne.*balance(?![^;]*lock\\s*:|[^;]*FOR UPDATE)"

  - id: BL-RACE-003
    name: stock-check-no-atomic
    description: "Inventory stock check and decrement not atomic"
    severity: high
    confidence: low
    cwe: [CWE-362]
    owasp: [A01:2025]
    languages: [javascript, typescript, python, php]
    patterns:
      - regex: "if\\s*\\([^)]*stock\\s*>\\s*0[^)]*\\)[^{]*\\{[^}]*stock\\s*-[=-]\\s*"
      - regex: "product\\.stock--(?![^;]*transaction|[^;]*atomic)"
