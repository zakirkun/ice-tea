rules:
  - id: BL-COUP-001
    name: coupon-no-user-tracking
    description: "Coupon redemption without checking if this user already used it"
    severity: medium
    confidence: low
    cwe: [CWE-840]
    owasp: [A01:2025]
    languages: [javascript, typescript, python, php]
    patterns:
      - regex: "(?:coupon|promo|discount).*(?:valid|active|exists)(?![^;]*user_id|[^;]*userId|[^;]*per_user)"
      - regex: "Coupon\\.findOne\\s*\\(\\s*\\{\\s*code\\s*:\\s*(?!.*userId)"

  - id: BL-COUP-002
    name: coupon-applied-without-transaction
    description: "Coupon marked as used without database transaction — race condition"
    severity: high
    confidence: low
    cwe: [CWE-362]
    owasp: [A01:2025]
    languages: [javascript, typescript, python, php]
    patterns:
      - regex: "coupon\\.used\\s*=\\s*true(?![^;]*transaction|[^;]*BEGIN|[^;]*session)"
      - regex: "UPDATE.*coupons.*SET.*used.*WHERE.*code(?![^;]*FOR UPDATE|[^;]*LOCK)"

  - id: BL-COUP-003
    name: discount-stack-no-limit
    description: "Multiple coupons applied without stacking limit enforcement"
    severity: medium
    confidence: low
    cwe: [CWE-840]
    owasp: [A01:2025]
    languages: [javascript, typescript, python, php]
    patterns:
      - regex: "coupons?\\.push\\s*\\([^)]+\\)(?![^;]*max|[^;]*limit|[^;]*length)"
      - regex: "appliedCoupons\\.length(?![^;]*<\\s*[1-2]|[^;]*max|[^;]*limit)"
