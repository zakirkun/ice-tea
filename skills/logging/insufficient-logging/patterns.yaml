rules:
    - id: LOG-INSUF-001
      name: login-failure-not-logged
      description: "Login failure handler does not log the failed attempt"
      severity: medium
      confidence: low
      cwe: [CWE-778]
      owasp: ['A09:2025']
      languages: [javascript, typescript, python, go, java, php, kotlin, dart, zig, elixir]
      patterns:
        - regex: "(?i)(?:invalid|wrong|incorrect|failed)\\s+(?:password|credentials|login)"
        - regex: "(?i)return\\s+res\\.(?:status\\(401\\)|json\\(\\{[^}]*error)\\)"
    - id: LOG-INSUF-002
      name: admin-action-not-logged
      description: "Administrative action (delete, ban, promote) without audit logging"
      severity: medium
      confidence: low
      cwe: [CWE-778]
      owasp: ['A09:2025']
      languages: [javascript, typescript, python, go, java, kotlin, dart, zig, elixir]
      patterns:
        - regex: "(?:User|Account)\\.(?:delete|destroy|remove)\\s*\\([^)]+\\)"
        - regex: "(?i)(?:ban|suspend|deactivate)(?:User|Account)"
    - id: LOG-INSUF-003
      name: password-change-not-logged
      description: "Password change operation without security event log entry"
      severity: medium
      confidence: low
      cwe: [CWE-778]
      owasp: ['A09:2025']
      languages: [javascript, typescript, python, go, java, php, kotlin, dart, zig, elixir]
      patterns:
        - regex: "(?:user|account)\\.(?:password|pass)\\s*=\\s*(?:newPassword|hashedPassword)"
        - regex: "(?i)changePassword|resetPassword"
    - id: LOG-INSUF-004
      name: access-denied-not-logged
      description: "403 Forbidden response returned without logging the access denial"
      severity: low
      confidence: low
      cwe: [CWE-778]
      owasp: ['A09:2025']
      languages: [javascript, typescript, python, go, kotlin, dart, zig, elixir]
      patterns:
        - regex: "res\\.(?:status\\s*\\(\\s*403\\s*\\)|sendStatus\\s*\\(\\s*403\\s*\\))"
        - regex: "http\\.Error\\s*\\(w,\\s*[^,]+,\\s*http\\.StatusForbidden\\)"
    - id: LOG-INSUF-005
      name: auth-token-validation-not-logged
      description: "JWT/token validation failure without security log entry"
      severity: medium
      confidence: low
      cwe: [CWE-778]
      owasp: ['A09:2025']
      languages: [javascript, typescript]
      patterns:
        - regex: "jwt\\.verify\\s*\\([^)]*,\\s*\\([^)]*err[^)]*\\)\\s*=>\\s*\\{[^}]*next\\s*\\(err\\)"
        - regex: "JsonWebTokenError.*next\\(err\\)"
