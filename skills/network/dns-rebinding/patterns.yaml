rules:
    - id: NET-DNS-001
      name: hostname-allowlist-without-ip-check
      description: "Host validation uses string comparison against hostname without IP verification"
      severity: high
      confidence: medium
      cwe: [CWE-350]
      owasp: ['A10:2025']
      languages: [javascript, typescript, python, go, java, kotlin, dart, zig, elixir]
      patterns:
        - regex: "(?:hostname|host)\\s*===?\\s*['\"](?:localhost|127\\.0\\.0\\.1)['\"]"
        - regex: "allowedHosts\\.includes\\s*\\(\\s*(?:req\\.hostname|host)\\s*\\)"
        - regex: "allowedOrigins\\.includes\\s*\\(\\s*origin\\s*\\)"
    - id: NET-DNS-002
      name: ssrf-dns-resolution-based-check
      description: "SSRF protection resolves DNS then checks IP — vulnerable to TOCTOU/rebinding"
      severity: high
      confidence: medium
      cwe: [CWE-350]
      owasp: ['A10:2025']
      languages: [python, javascript, typescript, go, java, kotlin, dart, zig, elixir]
      patterns:
        - regex: "socket\\.gethostbyname\\s*\\([^)]+\\)"
        - regex: "dns\\.resolve\\s*\\([^)]+,\\s*function)"
        - regex: "net\\.LookupHost\\s*\\([^)]+\\)"
    - id: NET-DNS-003
      name: http-server-no-host-validation
      description: "HTTP server binding to 0.0.0.0 without Host header validation (rebinding risk)"
      severity: medium
      confidence: low
      cwe: [CWE-350]
      owasp: ['A10:2025']
      languages: [go, python, javascript]
      patterns:
        - regex: "ListenAndServe\\s*\\(\\s*['\"]0\\.0\\.0\\.0:[^'\"]+['\"]"
        - regex: "app\\.run\\s*\\([^)]*host\\s*=\\s*['\"]0\\.0\\.0\\.0['\"]"
    - id: NET-DNS-004
      name: cors-host-based-only
      description: "CORS allowed origins based only on hostname without IP verification"
      severity: medium
      confidence: low
      cwe: [CWE-350]
      owasp: ['A10:2025']
      languages: [javascript, typescript, go]
      patterns:
        - regex: "origin\\.endsWith\\s*\\(['\"][^'\"]+['\"]\\)"
        - regex: "origin\\.includes\\s*\\(['\"][^'\"]+['\"]\\)"
