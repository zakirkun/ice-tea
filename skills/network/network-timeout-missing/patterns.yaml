rules:
    - id: NET-TOUT-001
      name: python-requests-no-timeout
      description: "Python requests.get/post without timeout parameter"
      severity: medium
      confidence: high
      cwe: [CWE-400]
      owasp: ['A04:2025']
      languages: [python]
      patterns:
        - regex: "requests\\.(?:get|post|put|patch|delete)\\s*\\([^)]*\\)"
        - regex: "session\\.(?:get|post|put)\\s*\\([^)]*\\)"
    - id: NET-TOUT-002
      name: go-http-no-timeout
      description: "Go http.Get/Post without context timeout or custom http.Client"
      severity: medium
      confidence: medium
      cwe: [CWE-400]
      owasp: ['A04:2025']
      languages: [go]
      patterns:
        - regex: "http\\.Get\\s*\\([^)]+\\)"
        - regex: "http\\.Post\\s*\\([^)]+\\)"
        - regex: "http\\.DefaultClient\\.Do\\s*\\("
    - id: NET-TOUT-003
      name: node-http-no-timeout
      description: "Node.js http.request without timeout option"
      severity: medium
      confidence: medium
      cwe: [CWE-400]
      owasp: ['A04:2025']
      languages: [javascript, typescript]
      patterns:
        - regex: "axios\\.(?:get|post|put)\\s*\\([^)]*\\)"
        - regex: "fetch\\s*\\([^,)]+\\)"
    - id: NET-TOUT-004
      name: java-httpclient-no-timeout
      description: "Java HttpClient or HttpURLConnection without timeout"
      severity: medium
      confidence: medium
      cwe: [CWE-400]
      owasp: ['A04:2025']
      languages: [java]
      patterns:
        - regex: "HttpURLConnection.*openConnection\\s*\\(\\s*\\)"
        - regex: "new\\s+OkHttpClient\\.Builder\\s*\\(\\s*\\)"
